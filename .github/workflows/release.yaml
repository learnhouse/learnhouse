name: Release

on:
  push:
    tags:
      - '[0-9]*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: learnhouse/app

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare platform pair
        id: prep
        run: |
          echo "platform_pair=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> $GITHUB_OUTPUT

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            LEARNHOUSE_PUBLIC=true
          cache-from: type=gha,scope=release-${{ steps.prep.outputs.platform_pair }}
          cache-to: type=gha,mode=max,scope=release-${{ steps.prep.outputs.platform_pair }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ steps.prep.outputs.platform_pair }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  release:
    name: Create release and push manifest
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Generate image tags
        id: meta
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          TAGS="${TAGS},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n' | xargs -I{} echo "-t {}" | tr '\n' ' ')
          docker buildx imagetools create $TAGS \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' *)

      # GitHub Release is created by the release script (authored by you, not the bot)

  notify:
    name: Announce release
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build Discord message
        id: discord
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --list '[0-9]*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -n1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi

          # Collect top features (max 5)
          FEATURES=$(git log "$RANGE" --grep="^feat" --pretty=format:"%s" | head -5 | sed 's/^feat[:(]*//' | sed 's/^[[:space:]]*//' | while read -r line; do echo "• ${line}"; done || true)
          FEAT_COUNT=$(git log "$RANGE" --grep="^feat" --oneline | wc -l | tr -d ' ')
          FIX_COUNT=$(git log "$RANGE" --grep="^fix" --oneline | wc -l | tr -d ' ')

          # Check for migrations
          if [ -n "$PREV_TAG" ]; then
            MIGRATION_COUNT=$(git diff --name-only "$PREV_TAG"..HEAD -- 'apps/api/migrations/versions/*.py' | grep -v '__pycache__' | wc -l | tr -d ' ')
          else
            MIGRATION_COUNT=$(git ls-tree -r --name-only HEAD -- 'apps/api/migrations/versions/' | grep '\.py$' | wc -l | tr -d ' ')
          fi

          # Build highlights
          HIGHLIGHTS=""
          if [ -n "$FEATURES" ]; then
            HIGHLIGHTS="${FEATURES}"
            if [ "$FEAT_COUNT" -gt 5 ]; then
              HIGHLIGHTS="${HIGHLIGHTS}\n• ...and $((FEAT_COUNT - 5)) more"
            fi
          fi

          # Build migration note
          MIGRATION_NOTE=""
          if [ "$MIGRATION_COUNT" -gt 0 ]; then
            MIGRATION_NOTE="⚠️ Includes ${MIGRATION_COUNT} database migration(s) — back up before upgrading"
          fi

          # Build the embed description
          DESC="A new version of LearnHouse is available with **${FEAT_COUNT}** new feature(s) and **${FIX_COUNT}** bug fix(es)."
          if [ -n "$HIGHLIGHTS" ]; then
            DESC="${DESC}\n\n**Highlights:**\n${HIGHLIGHTS}"
          fi
          if [ -n "$MIGRATION_NOTE" ]; then
            DESC="${DESC}\n\n${MIGRATION_NOTE}"
          fi

          # Write the JSON payload
          cat > /tmp/discord.json << PAYLOAD
          {
            "content": "<@&RELEASE_PING_ROLE_ID>",
            "embeds": [{
              "title": "LearnHouse ${VERSION}",
              "url": "https://github.com/${{ github.repository }}/releases/tag/${VERSION}",
              "description": "${DESC}",
              "color": 3066993,
              "fields": [
                {
                  "name": "Install",
                  "value": "\`npx learnhouse setup\`",
                  "inline": true
                },
                {
                  "name": "Upgrade",
                  "value": "\`npx learnhouse update --version ${VERSION}\`",
                  "inline": true
                },
                {
                  "name": "Docker",
                  "value": "\`docker pull ghcr.io/learnhouse/app:${VERSION}\`",
                  "inline": false
                }
              ],
              "thumbnail": {
                "url": "https://github.com/learnhouse.png"
              },
              "footer": {
                "text": "LearnHouse • Open Source LMS"
              },
              "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            }]
          }
          PAYLOAD

          # Remove the role ping line if no role ID is configured
          sed -i 's/"content": "<@&RELEASE_PING_ROLE_ID>",//' /tmp/discord.json

      - name: Send to Discord
        if: ${{ env.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d @/tmp/discord.json \
            "$DISCORD_WEBHOOK_URL"
