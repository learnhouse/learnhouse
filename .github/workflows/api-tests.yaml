name: API Tests
permissions:
  contents: read
on:
  push:
    branches:
      - dev
    paths:
      - "apps/api/**"
  pull_request:
    paths:
      - "apps/api/**"
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Install dependencies
        run: uv sync
        working-directory: apps/api

      - name: Run tests
        run: uv run pytest src/tests/ -v --tb=short
        working-directory: apps/api
        env:
          TESTING: "true"

      - name: Run security tests with coverage
        run: uv run pytest src/tests/security/ --cov=src.security --cov-report=html --cov-report=term-missing
        working-directory: apps/api
        env:
          TESTING: "true"

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: apps/api/htmlcov/
          retention-days: 30
