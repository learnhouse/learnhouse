name: Web Lint
on:
  push:
    branches:
      - dev
    paths:
      - "apps/web/**"
  pull_request:
    paths:
      - "apps/web/**"
permissions:
  contents: read
jobs:
  next-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
        working-directory: ./apps/web
      - name: Lint
        run: bun run lint
        working-directory: ./apps/web
