name: Publish CLI to npm

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write
  id-token: write

defaults:
  run:
    working-directory: apps/cli

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#cli-v}" >> $GITHUB_OUTPUT

      - name: Verify version matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        run: npm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate CLI changelog
        id: changelog
        run: |
          # Find the previous cli-v* tag
          PREV_TAG=$(git tag --list 'cli-v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -n1)
          if [ -z "$PREV_TAG" ]; then
            # First release — show all CLI commits
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          # Only include commits that touched apps/cli/
          NOTES=$(git log "$RANGE" --pretty=format:"- %s (%h)" -- apps/cli/)
          if [ -z "$NOTES" ]; then
            NOTES="- Maintenance release"
          fi
          # Write to file to preserve newlines
          echo "$NOTES" > /tmp/cli-changelog.md
        working-directory: ${{ github.workspace }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: CLI ${{ steps.version.outputs.version }}
          body_path: /tmp/cli-changelog.md
