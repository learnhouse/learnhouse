version: "3.9"

name: learnhouse-b4167307

services:
  learnhouse-app:
    image: ghcr.io/learnhouse/app:latest
    container_name: learnhouse-app-b4167307
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # HOSTNAME needs to be set explicitly for the container
      - HOSTNAME=0.0.0.0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - learnhouse-network-b4167307
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  learnhouse-collab:
    image: ghcr.io/learnhouse/collab:latest
    container_name: learnhouse-collab-b4167307
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - COLLAB_PORT=4000
      - LEARNHOUSE_API_URL=http://learnhouse-app-b4167307:9000
    depends_on:
      learnhouse-app:
        condition: service_healthy
    networks:
      - learnhouse-network-b4167307

  nginx:
    image: nginx:alpine
    container_name: learnhouse-nginx-b4167307
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./extra/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      learnhouse-app:
        condition: service_healthy
      learnhouse-collab:
        condition: service_started
    networks:
      - learnhouse-network-b4167307
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:18-alpine
    container_name: learnhouse-db-b4167307
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-learnhouse}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-learnhouse}
      - POSTGRES_DB=${POSTGRES_DB:-learnhouse}
    volumes:
      - learnhouse_db_data_b4167307:/var/lib/postgresql/data
    networks:
      - learnhouse-network-b4167307
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnhouse}"]
      interval: 5s
      timeout: 4s
      retries: 5

  redis:
    image: redis:8.6.1-alpine
    container_name: learnhouse-redis-b4167307
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - learnhouse_redis_data_b4167307:/data
    networks:
      - learnhouse-network-b4167307
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 4s
      retries: 5

networks:
  learnhouse-network-b4167307:
    driver: bridge

volumes:
  learnhouse_db_data_b4167307:
  learnhouse_redis_data_b4167307:
