[project]
description = "Learnhouse Backend"
name = "learnhouse-api"
version = "0.1.0"
requires-python = ">=3.12.3,<3.13.0"
authors = [
    {name = "Badr B. (swve)"}
]
dependencies = [
    "boto3>=1.37.27",
    "botocore>=1.37.27",
    "faker>=37.1.0",
    "fastapi==0.115.9",
    "fastapi-jwt-auth>=0.5.0",
    "httpx>=0.28.1",
    "langchain>=0.2.5",
    "langchain-community>=0.2.5",
    "langchain-openai>=0.1.14",
    "openai>=1.70.0",
    "passlib>=1.7.4",
    "psycopg2-binary>=2.9.10",
    "pydantic[email]>=1.10.21,<2.0.0",
    "pytest>=8.3.5",
    "python-dotenv>=1.1.0",
    "python-multipart>=0.0.20",
    "pyyaml>=6.0.2",
    "redis>=5.2.1",
    "requests>=2.32.3",
    "resend>=2.7.0",
    "sqlmodel>=0.0.24",
    "tiktoken>=0.9.0",
    "uvicorn==0.34.0",
    "typer>=0.15.2",
    "chromadb==1.0.0",
    "alembic>=1.15.2",
    "alembic-postgresql-enum>=1.7.0",
    "sqlalchemy-utils>=0.41.2",
    "stripe>=12.0.0",
    "python-jose>=3.4.0",
    "logfire[sqlalchemy]>=3.12.0",
]

[tool.ruff]
lint.ignore = ["E501", "E712"]

[tool.logfire]
ignore_no_config=true
