[project]
description = "Learnhouse Backend"
name = "learnhouse-api"
version = "0.1.0"
requires-python = ">=3.14.3,<3.14.4"
authors = [
    {name = "Badr B. (swve)"}
]
dependencies = [
    "boto3>=1.42.59",
    "botocore>=1.42.59",
    "faker>=40.5.1",
    "fastapi>=0.135.1",
    "httpx>=0.28.1",
    "google-genai>=1.65.0",
    "pwdlib[argon2]>=0.3.0",
    "psycopg2-binary>=2.9.11",
    "pydantic[email]>=2.12.5,<3.0.0",
    "pytest>=9.0.2",
    "pytest-cov>=7.0.0",
    "python-dotenv>=1.2.2",
    "python-multipart>=0.0.22",
    "pyyaml>=6.0.3",
    "redis>=7.2.1",
    "requests>=2.32.5",
    "resend>=2.23.0",
    "sqlmodel>=0.0.37",
    "tiktoken>=0.12.0",
    "uvicorn==0.41.0",
    "typer>=0.24.1",
    "alembic>=1.18.4",
    "alembic-postgresql-enum>=1.10.0",
    "sqlalchemy-utils>=0.42.1",
    "stripe>=14.4.0",
    "pyjwt[crypto]>=2.11.0",
    "beautifulsoup4>=4.14.3",
    "pytest-asyncio>=1.3.0",
    "sentry-sdk[fastapi]>=2.53.0",
    "protobuf>=7.34.0",
    "workos>=5.42.1",
    "dnspython>=2.8.0",
    "defusedxml>=0.7.1",
    "llama-index-core>=0.14.15",
    "pgvector>=0.4.2",
    "pypdf>=6.7.5",
]

[tool.ruff]
lint.ignore = ["E501", "E712"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "asyncio: mark test as async",
]
filterwarnings = [
    "ignore::DeprecationWarning",
    "ignore::UserWarning",
    "ignore:.*crypt.*deprecated.*",
    "ignore:.*utcnow.*deprecated.*",
    "ignore:.*Instrumentation will have no effect.*",
    "ignore:.*handler names should be lower-case.*",
]
