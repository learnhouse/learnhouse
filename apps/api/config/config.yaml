site_name: LearnHouse
site_description: LearnHouse is an open-source platform tailored for learning experiences.
contact_email: hi@learnhouse.app

# This config is optimized for local development. You can change the values according to your needs.

general:
  # SECURITY: default to production-safe; enable with LEARNHOUSE_DEVELOPMENT_MODE=true for local dev.
  development_mode: false

security:
  # SECURITY: Set via LEARNHOUSE_AUTH_JWT_SECRET_KEY env var (required, min 32 chars).
  # Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
  auth_jwt_secret_key: ""

hosting_config:
  # tenancy: "single" (default) serves the default org on any host (localhost
  # or self-hosted VPS). "multi" enables slug.{domain} subdomain detection and
  # requires the EE folder. Override with LEARNHOUSE_TENANCY.
  tenancy: single
  domain: localhost:3000
  frontend_domain: localhost:3000
  ssl: false
  port: 1338
  allowed_origins:
    - http://localhost:3000
    - http://localhost:3001
  cookies_config:
    domain: ".localhost"
  allowed_regexp: '\b((?:https?://)[^\s/$.?#].[^\s]*)\b'
  content_delivery:
    type: "filesystem" # "filesystem" or "s3api"
    s3api:
      bucket_name: ""
      endpoint_url: ""

mailing_config:
  email_provider: "resend" # "resend" or "smtp"
  system_email_address: ""
  resend_api_key: ""
  smtp_host: ""
  smtp_port: 587
  smtp_username: ""
  smtp_password: ""
  smtp_use_tls: true

database_config:
  sql_connection_string: postgresql://learnhouse:learnhouse@localhost:5432/learnhouse

redis_config:
  redis_connection_string: redis://localhost:6379/learnhouse

payments_config:
  # See ee/services/payments/README.md for full setup instructions.
  # To add a new payment provider, add its credentials block here and register
  # it in ee/db/payments/payments.py (PaymentProviderEnum) and config/config.py.
  stripe:
    # Platform API keys — Stripe Dashboard → Developers → API keys
    stripe_secret_key: ""        # sk_live_... (or sk_test_... for development)
    stripe_publishable_key: ""   # pk_live_... (or pk_test_... for development)
    # Stripe Connect OAuth client ID — Stripe Dashboard → Settings → Connect → OAuth
    stripe_client_id: ""         # ca_...
    # Webhook signing secrets — Stripe Dashboard → Developers → Webhooks
    # Standard endpoint:  POST /payments/stripe/webhook/standard
    stripe_webhook_standard_secret: ""   # whsec_...
    # Connect endpoint:   POST /payments/stripe/webhook/connect
    stripe_webhook_connect_secret: ""    # whsec_...

ai_config:
  is_ai_enabled: false
  # Provider-agnostic generation (Pydantic AI). Set provider + api_key to use any
  # supported provider: google | openai | anthropic | groq | mistral | openrouter | bedrock | ollama.
  # base_url is optional (OpenAI-compatible / local endpoints, e.g. Ollama).
  # For "openrouter": leave base_url blank (auto-set) and use OpenRouter model slugs like
  # "anthropic/claude-sonnet-4-5" or "openai/gpt-4o-mini" in the model_* fields below.
  # For "bedrock": use standard AWS credentials (env/role/profile) + AWS_REGION; api_key optional.
  provider: "google"
  api_key: ""
  base_url: ""
  # Three model tiers. Leave blank to use the built-in Gemini 3 defaults.
  model_fast: ""        # titles, follow-ups, migration                 (default: gemini-3.1-flash-lite)
  model_standard: ""    # chat, RAG, course planning / blocks (std plan) (default: gemini-3.5-flash)
  model_pro: ""         # course planning / blocks (Pro+ plan)          (default: gemini-3.1-pro-preview)
  # RAG embeddings follow the chosen provider (Google / OpenAI family incl. Ollama). Override
  # any of these; embedding_dimensions defaults to 768 to match the pgvector column (changing
  # it requires a DB migration + re-index). Providers without embeddings (Anthropic, Groq,
  # Mistral, OpenRouter, Bedrock) fall back to Google when gemini_api_key is set.
  embedding_provider: ""    # default: same as `provider`
  embedding_model: ""       # default per provider (e.g. gemini-embedding-001, text-embedding-3-small)
  embedding_dimensions: ""  # default: 768
  # Google/Gemini key. Also the embeddings fallback for providers that lack an embeddings API.
  gemini_api_key: ""

tinybird_config:
  # Set api_url to enable analytics automatically
  api_url: ""
  ingest_token: ""
  read_token: ""
