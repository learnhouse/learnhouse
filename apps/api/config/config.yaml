site_name: LearnHouse
site_description: LearnHouse is an open-source platform tailored for learning experiences.
contact_email: hi@learnhouse.app

# This config is optimized for local development. You can change the values according to your needs.

general:
  development_mode: true
  logfire_enabled: false

security:
  auth_jwt_secret_key: secret

hosting_config:
  domain: learnhouse.app
  ssl: true
  port: 1338
  allowed_origins:
    - http://localhost:3000
    - http://localhost:3001
  cookies_config:
    domain: ".localhost"
  allowed_regexp: '\b((?:https?://)[^\s/$.?#].[^\s]*)\b'
  content_delivery:
    type: "filesystem" # "filesystem" or "s3api"
    s3api:
      bucket_name: ""
      endpoint_url: ""

mailing_config:
  resend_api_key: ""
  system_email_address: ""

database_config:
  # Database connection string
  # For local development (Docker PostgreSQL):
  #   postgresql://learnhouse:learnhouse@localhost:5432/learnhouse
  # For production (Neon PostgreSQL):
  #   postgresql://user:password@ep-xxx-xxx.region.aws.neon.tech/dbname?sslmode=require
  # The system auto-detects database type from connection string:
  #   - Neon: *.neon.tech domains
  #   - Docker: localhost or 127.0.0.1
  #   - Other: Generic PostgreSQL
  # Can be overridden via LEARNHOUSE_SQL_CONNECTION_STRING environment variable
  sql_connection_string: postgresql://learnhouse:learnhouse@localhost:5432/learnhouse

redis_config:
  redis_connection_string: redis://localhost:6379/learnhouse

payments_config:
  stripe:
    stripe_secret_key: ""
    stripe_publishable_key: ""
    stripe_webhook_standard_secret: ""
    stripe_client_id: ""

ai_config:
  openai_api_key: ""
  is_ai_enabled: false
