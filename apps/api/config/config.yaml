site_name: LearnHouse
site_description: LearnHouse is an open-source platform tailored for learning experiences.
contact_email: hi@learnhouse.app

# This config is optimized for local development. You can change the values according to your needs.

general:
  development_mode: true
  logfire_enabled: false

security:
  auth_jwt_secret_key: learnhouse-dev-secret-key-32chars!

hosting_config:
  domain: localhost:3000
  frontend_domain: localhost:3000
  ssl: false
  port: 1338
  allowed_origins:
    - http://localhost:3000
    - http://localhost:3001
  cookies_config:
    domain: ".localhost"
  allowed_regexp: '\b((?:https?://)[^\s/$.?#].[^\s]*)\b'
  content_delivery:
    type: "filesystem" # "filesystem" or "s3api"
    s3api:
      bucket_name: ""
      endpoint_url: ""

mailing_config:
  resend_api_key: ""
  system_email_address: ""

database_config:
  sql_connection_string: postgresql://learnhouse:learnhouse@localhost:5432/learnhouse

redis_config:
  redis_connection_string: redis://localhost:6379/learnhouse

payments_config:
  stripe:
    stripe_secret_key: ""
    stripe_publishable_key: ""
    stripe_webhook_standard_secret: ""
    stripe_client_id: ""

ai_config:
  gemini_api_key: ""
  is_ai_enabled: false

tinybird_config:
  # Set api_url to enable analytics automatically
  api_url: ""
  ingest_token: ""
  read_token: ""
